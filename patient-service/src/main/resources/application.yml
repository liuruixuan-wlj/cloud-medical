server:
  port: 8082

spring:
  application:
    name: patient-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 60000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hospital: debug